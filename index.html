<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard's Tower — Indirect Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08081a;
  --card: rgba(14,9,38,0.95);
  --purple: #7b4fff;
  --purple-lt: #b084ff;
  --teal: #00e5c4;
  --gold: #ffd166;
  --text: #e8e0ff;
  --dim: #9088bb;
  --ok: #00c97a;
  --err: #ff4d6d;
  --border: rgba(123,79,255,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; display:flex;
  justify-content:center; align-items:center;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 18% 28%,rgba(80,40,160,.3) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 82% 72%,rgba(0,100,120,.2) 0%,transparent 70%);
  z-index:0;
}
#sf{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1);}50%{opacity:.9;transform:scale(1.3);}}

/* ── CARD ── */
#app{
  position:relative;z-index:5;overflow:visible;
  width:94%;max-width:520px;
  background:var(--card);
  padding:2rem 2rem 2.4rem;
  border-radius:20px;
  border:1px solid var(--border);
  box-shadow:0 0 60px rgba(123,79,255,.2),0 20px 60px rgba(0,0,0,.6),
             inset 0 1px 0 rgba(255,255,255,.07);
  backdrop-filter:blur(14px);
}

/* fade transition */
.scene{animation:sceneIn .45s ease both;position:relative;}
@keyframes sceneIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── PROGRESS ── */
.prog-track{height:4px;background:rgba(255,255,255,.08);border-radius:10px;margin-bottom:1.8rem;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--teal));border-radius:10px;
  transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px var(--teal);}

/* ── ORB SMALL ── */
.orb-sm{
  width:88px;height:88px;border-radius:50%;margin:0 auto 1.2rem;
  background:radial-gradient(circle at 35% 30%,#d4b8ff 0%,var(--purple-lt) 25%,var(--purple) 55%,#2a0060 100%);
  box-shadow:0 0 20px rgba(123,79,255,.7),0 0 50px rgba(123,79,255,.3),inset 0 -5px 15px rgba(0,0,0,.4);
  animation:orbPulse 3s ease-in-out infinite;
  position:relative;transition:background .7s,box-shadow .7s;
}
.orb-sm::after{content:'';position:absolute;top:15%;left:22%;width:28%;height:18%;
  background:rgba(255,255,255,.55);border-radius:50%;filter:blur(4px);transform:rotate(-30deg);}
@keyframes orbPulse{
  0%,100%{box-shadow:0 0 20px rgba(123,79,255,.7),0 0 50px rgba(123,79,255,.3),inset 0 -5px 15px rgba(0,0,0,.4);transform:scale(1);}
  50%{box-shadow:0 0 30px rgba(123,79,255,.9),0 0 80px rgba(123,79,255,.5),inset 0 -5px 15px rgba(0,0,0,.4);transform:scale(1.05);}
}

/* ── ORB BIG (answer) ── */
.orb-big-wrap{position:relative;width:160px;margin:0 auto 1.6rem;}
.ripple{position:absolute;border-radius:50%;border:2px solid rgba(123,79,255,.4);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:ripOut 2.4s ease-out infinite;}
.ripple:nth-child(2){animation-delay:.8s;}.ripple:nth-child(3){animation-delay:1.6s;}
@keyframes ripOut{0%{width:160px;height:160px;opacity:.7;}100%{width:290px;height:290px;opacity:0;}}
.orb-big{
  width:160px;height:160px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 35% 30%,#d4b8ff 0%,var(--purple-lt) 25%,var(--purple) 55%,#2a0060 100%);
  box-shadow:0 0 40px rgba(123,79,255,.8),0 0 90px rgba(123,79,255,.4),inset 0 -5px 15px rgba(0,0,0,.4);
  animation:orbPulseBig 2.5s ease-in-out infinite;
  position:relative;transition:background 1s,box-shadow 1s;
}
.orb-big::after{content:'';position:absolute;top:13%;left:20%;width:30%;height:20%;
  background:rgba(255,255,255,.5);border-radius:50%;filter:blur(5px);transform:rotate(-30deg);}
@keyframes orbPulseBig{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.orb-icon{font-size:3.6rem;z-index:2;position:relative;
  filter:drop-shadow(0 0 14px rgba(255,255,255,.7));
  animation:iconPop .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes iconPop{from{opacity:0;transform:scale(.2) rotate(-30deg);}to{opacity:1;transform:scale(1) rotate(0deg);}}

/* ── TYPOGRAPHY ── */
.cinzel{font-family:'Cinzel',serif;}
.room-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;
  text-align:center;letter-spacing:.08em;margin-bottom:1.1rem;
  text-shadow:0 0 20px rgba(255,209,102,.5);}
.story-box{
  background:rgba(0,0,0,.35);border:1px solid rgba(123,79,255,.25);
  border-left:3px solid var(--purple);padding:1rem 1.1rem;
  border-radius:10px;font-size:.93rem;line-height:1.75;margin-bottom:1.3rem;
}
.eng-sub{display:block;margin-top:6px;color:var(--dim);font-size:.8rem;font-style:italic;}
.step-pill{
  display:inline-block;font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.12em;
  color:var(--teal);background:rgba(0,229,196,.1);border:1px solid rgba(0,229,196,.3);
  padding:2px 10px;border-radius:20px;margin-bottom:.5rem;
}
.step-block{margin-bottom:1.1rem;}
.q-text{font-size:.93rem;line-height:1.65;margin-top:.4rem;}
.q-text small{color:var(--dim);font-size:.82rem;}

/* ── OPTION GRID (A) ── */
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:.8rem;}
.opt-btn{
  padding:10px 6px;background:rgba(123,79,255,.1);border:1px solid rgba(123,79,255,.35);
  color:var(--text);border-radius:10px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:700;
  transition:all .2s;text-align:center;
}
.opt-btn:hover:not(:disabled){background:rgba(123,79,255,.28);border-color:var(--purple-lt);
  transform:translateY(-2px);box-shadow:0 4px 16px rgba(123,79,255,.3);}
.opt-btn.correct{background:rgba(0,201,122,.2);border-color:var(--ok);color:var(--ok);animation:popIn .3s ease;}
.opt-btn.wrong{background:rgba(255,77,109,.15);border-color:var(--err);color:var(--err);animation:shake .4s ease;}
@keyframes popIn{0%{transform:scale(.95);}60%{transform:scale(1.06);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

/* ── WORD CARDS (B) ── */
.word-pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:.8rem;min-height:46px;}
.word-slot{display:flex;flex-wrap:wrap;gap:8px;min-height:44px;margin-top:.6rem;
  padding:.5rem .6rem;background:rgba(0,0,0,.3);border-radius:10px;
  border:1px dashed rgba(123,79,255,.4);}
.w-card{
  padding:7px 14px;border-radius:8px;font-weight:700;font-size:.88rem;cursor:pointer;
  transition:all .2s;user-select:none;
}
.w-card.pool{background:rgba(123,79,255,.18);border:1px solid rgba(123,79,255,.5);color:var(--purple-lt);}
.w-card.pool:hover{background:rgba(123,79,255,.35);transform:translateY(-2px);}
.w-card.placed{background:rgba(0,229,196,.15);border:1px solid rgba(0,229,196,.5);color:var(--teal);}
.w-card.placed:hover{background:rgba(0,229,196,.28);transform:translateY(-2px);}
.w-card.correct-card{background:rgba(0,201,122,.2);border-color:var(--ok);color:var(--ok);pointer-events:none;}
.w-card.wrong-card{background:rgba(255,77,109,.15);border-color:var(--err);color:var(--err);}
.slot-label{font-size:.72rem;color:var(--dim);margin-top:.3rem;display:block;}
.check-btn{
  width:100%;padding:10px;margin-top:.8rem;
  background:rgba(0,229,196,.1);border:1px solid rgba(0,229,196,.4);
  color:var(--teal);border-radius:10px;font-family:'Noto Sans KR',sans-serif;
  font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;
}
.check-btn:hover{background:rgba(0,229,196,.22);}
.check-btn:disabled{opacity:.4;cursor:default;}

/* ── FINAL SENTENCE ── */
.final-box{
  margin-top:.9rem;padding:.85rem 1rem;
  background:rgba(0,201,122,.1);border:1px solid rgba(0,201,122,.4);
  border-radius:10px;animation:fadeUp .5s ease;
}
.final-sent{color:var(--ok);font-weight:700;font-size:.95rem;}
.speak-hint{margin-top:5px;font-size:.78rem;color:var(--gold);}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── ANSWER SCREEN ── */
.ans-label{font-family:'Cinzel',serif;color:var(--dim);font-size:.7rem;
  letter-spacing:.2em;text-align:center;margin-bottom:1.1rem;}
.speech-bubble{
  position:relative;background:rgba(14,8,40,.9);
  border:1px solid rgba(123,79,255,.5);border-radius:16px;
  padding:1.1rem 1.3rem;text-align:left;
  animation:fadeUp .5s ease .2s both;
}
.speech-bubble::before{content:'';position:absolute;top:-11px;left:50%;transform:translateX(-50%);
  border:11px solid transparent;border-bottom-color:rgba(123,79,255,.5);border-top:0;}
.speech-bubble::after{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  border:9px solid transparent;border-bottom-color:#0e0828;border-top:0;}
.speech-kr{font-size:1.05rem;font-weight:700;color:var(--gold);line-height:1.6;
  text-shadow:0 0 12px rgba(255,209,102,.4);}
.speech-en{font-size:.82rem;color:var(--dim);font-style:italic;margin-top:6px;line-height:1.5;}
.clue-bar{margin-top:.9rem;padding:.6rem 1rem;background:rgba(0,229,196,.07);
  border:1px solid rgba(0,229,196,.25);border-radius:10px;
  font-size:.82rem;color:var(--teal);text-align:center;animation:fadeUp .5s ease .4s both;}

/* ── BUTTONS ── */
.btn-main{
  display:block;width:100%;padding:13px;margin-top:1rem;
  border:none;border-radius:12px;color:#fff;
  font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:.95rem;
  cursor:pointer;letter-spacing:.04em;transition:all .25s;
}
.btn-purple{background:linear-gradient(135deg,var(--purple),#5500cc);
  box-shadow:0 4px 20px rgba(123,79,255,.5);}
.btn-purple:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(123,79,255,.7);}
.btn-ask{background:linear-gradient(135deg,#1a0050,#5500cc,#9b6fff);
  border:1px solid rgba(176,132,255,.5);box-shadow:0 4px 24px rgba(123,79,255,.5);}
.btn-ask:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(123,79,255,.9);}

/* ── VERSION SELECT ── */
.ver-wrap{display:flex;gap:14px;margin-top:1.4rem;}
.ver-card{
  flex:1;padding:1.3rem 1rem;border-radius:14px;cursor:pointer;
  text-align:center;transition:all .25s;border:2px solid transparent;
  background:rgba(123,79,255,.1);
}
.ver-card:hover{transform:translateY(-3px);}
.ver-card.A{border-color:rgba(0,229,196,.6);}
.ver-card.A:hover{background:rgba(0,229,196,.12);}
.ver-card.B{border-color:rgba(255,209,102,.6);}
.ver-card.B:hover{background:rgba(255,209,102,.1);}
.ver-badge{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;display:block;margin-bottom:.4rem;}
.ver-badge.A{color:var(--teal);}
.ver-badge.B{color:var(--gold);}
.ver-name{font-weight:700;font-size:.9rem;display:block;margin-bottom:.3rem;}
.ver-desc{font-size:.77rem;color:var(--dim);line-height:1.5;}

/* ── END ── */
.end-emoji{font-size:3.5rem;display:block;text-align:center;margin:.4rem 0;
  animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.end-title{font-family:'Cinzel',serif;color:var(--gold);text-align:center;
  font-size:1.15rem;margin-top:.6rem;text-shadow:0 0 20px rgba(255,209,102,.7);}

/* ── WORD CHIP (step A display) ── */
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:.4rem;}
.chip{background:rgba(123,79,255,.2);border:1px solid rgba(123,79,255,.4);
  color:var(--purple-lt);padding:4px 12px;border-radius:20px;font-size:.85rem;font-weight:500;}

/* ── PARTICLES ── */
.pt{position:fixed;pointer-events:none;z-index:999;border-radius:50%;
  animation:ptFly 1.2s ease-out forwards;}
@keyframes ptFly{0%{opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}

.hidden{display:none!important;}

/* ── HOME BUTTON ── */
.home-btn{
  position:fixed;
  top:1.1rem;right:calc(50% - 260px + 1rem);
  background:rgba(123,79,255,.2);border:1px solid rgba(123,79,255,.45);
  color:var(--dim);border-radius:8px;padding:6px 13px;
  font-family:'Noto Sans KR',sans-serif;font-size:.78rem;font-weight:700;
  cursor:pointer;transition:all .2s;z-index:9999;letter-spacing:.02em;
  backdrop-filter:blur(6px);pointer-events:all;
}
.home-btn:hover{background:rgba(123,79,255,.4);color:var(--text);border-color:var(--purple-lt);}
@media(max-width:560px){
  .home-btn{ right:1rem; top:.9rem; }
}

/* ── TTS BUTTON ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.35);
  color:var(--gold);border-radius:20px;padding:6px 14px;
  font-family:'Noto Sans KR',sans-serif;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all .2s;margin:0 auto .2rem;
  letter-spacing:.02em;
}
.tts-btn:hover{background:rgba(255,209,102,.2);border-color:var(--gold);}
.tts-btn.playing{background:rgba(255,209,102,.2);border-color:var(--gold);
  animation:ttsGlow 1.2s ease-in-out infinite;}
@keyframes ttsGlow{0%,100%{box-shadow:0 0 0 rgba(255,209,102,0);}50%{box-shadow:0 0 12px rgba(255,209,102,.5);}}
.tts-wrap{display:flex;justify-content:center;margin-bottom:.8rem;}
/* ── ROOM MAP ── */
.room-map{
  display:flex;align-items:center;justify-content:center;
  gap:3px;margin-bottom:1.2rem;flex-wrap:nowrap;
}
.rm-node{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  opacity:.35;transition:opacity .3s;
}
.rm-node.done{ opacity:.7; }
.rm-node.active{ opacity:1; }
.rm-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
  border:2px solid rgba(123,79,255,.3);
  background:rgba(123,79,255,.1);
  transition:all .3s;
}
.rm-node.done .rm-dot{
  background:rgba(0,201,122,.2);border-color:var(--ok);
}
.rm-node.active .rm-dot{
  background:rgba(123,79,255,.35);border-color:var(--purple-lt);
  box-shadow:0 0 10px rgba(123,79,255,.6);
  animation:rmPulse 1.8s ease-in-out infinite;
}
@keyframes rmPulse{0%,100%{box-shadow:0 0 8px rgba(123,79,255,.5);}50%{box-shadow:0 0 18px rgba(123,79,255,.9);}}
.rm-label{font-size:.5rem;color:var(--dim);letter-spacing:.02em;text-align:center;line-height:1.2;}
.rm-node.active .rm-label{color:var(--purple-lt);}
.rm-arrow{color:rgba(123,79,255,.3);font-size:.7rem;margin-bottom:10px;}
@media(max-width:400px){
  .rm-dot{width:24px;height:24px;font-size:.75rem;}
  .rm-label{display:none;}
}
</style>
</head>
<body>
<div id="sf"></div>
<div id="home-btn-wrap" style="display:none;">
  <button class="home-btn" onclick="goHome()">🏠 홈</button>
</div>
<div id="app"></div>

<script>
/* ═══════════════ STARFIELD ═══════════════ */
(()=>{
  const sf=document.getElementById('sf');
  for(let i=0;i<120;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--dl:-${(Math.random()*5).toFixed(1)}s;`;
    sf.appendChild(s);
  }
})();

/* ═══════════════ PARTICLES ═══════════════ */
function burst(x,y,n=14){
  const cols=['#7b4fff','#00e5c4','#ffd166','#b084ff','#ff9de2'];
  for(let i=0;i<n;i++){
    const p=document.createElement('div'); p.className='pt';
    const sz=Math.random()*8+4, ang=(i/n)*2*Math.PI, d=Math.random()*80+30;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${x}px;top:${y}px;background:${cols[Math.floor(Math.random()*cols.length)]};--tx:${Math.cos(ang)*d}px;--ty:${Math.sin(ang)*d}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1300);
  }
}

/* ═══════════════ DATA ═══════════════ */
const ROOMS=[
  /* ── ROOM 1: 생존 · where ── */
  {
    title:"ROOM 1 · 생존",
    emoji:"🩸",
    storyKr:"마법사의 탑에 독이 퍼졌습니다. 살아남으려면 약이 필요합니다.\n하지만 약이 어디 있는지 알 수가 없어요.",
    storyEn:"Poison fills the air. You need medicine to survive.\nBut you have no idea where it is.",
    wh:"where",
    questionA:"우리는 ______ 약이 있는지 알아야 합니다.",
    questionAen:"We need to know ______ the medicine is.",
    optionsA:["what","who","where","when"],
    wordsB:["where","the medicine","is"],
    sentencePrefix:"Can you tell me",
    finalA:"Can you tell me where the medicine is?",
    finalB:"Can you tell me where the medicine is?",
    orbIcon:"💊",
    orbBg:"radial-gradient(circle at 35% 30%,#b8ffd4 0%,#00e5c4 30%,#007a60 70%,#001a14 100%)",
    orbGlow:"0 0 50px rgba(0,229,196,.9),0 0 110px rgba(0,229,196,.4),inset 0 -5px 15px rgba(0,0,0,.4)",
    speechKr:"약은 3층 창고 안 붉은 상자에 있다.",
    speechEn:"The medicine is in the red box in the third-floor storage.",
    clue:"🗝️ 3층 붉은 상자를 찾아라! — You feel better now."
  },
  /* ── ROOM 2: 침입자 · who ── */
  {
    title:"ROOM 2 · 침입자",
    emoji:"🕵️",
    storyKr:"마스터 키가 사라졌습니다! 당신 말고 누군가가 이 탑에 있었습니다.\n누가 침입했는지 알아내야 합니다.",
    storyEn:"The Master Key is gone! Someone else was in this tower.\nYou must find out who broke in.",
    wh:"who",
    questionA:"우리는 ______ 이곳에 침입했는지 알아야 합니다.",
    questionAen:"We need to know ______ broke into this place.",
    optionsA:["when","what","who","where"],
    wordsB:["who","broke into","this place"],
    sentencePrefix:"Do you know",
    finalA:"Do you know who broke into this place?",
    finalB:"Do you know who broke into this place?",
    orbIcon:"🦹",
    orbBg:"radial-gradient(circle at 35% 30%,#ffd0e8 0%,#ff9de2 30%,#8b0057 70%,#1a0010 100%)",
    orbGlow:"0 0 50px rgba(255,100,200,.8),0 0 110px rgba(255,100,200,.3),inset 0 -5px 15px rgba(0,0,0,.4)",
    speechKr:"침입자는 검은 망토를 입은 마법사의 제자다. 마법사의 방으로 향했다.",
    speechEn:"The intruder is the wizard's apprentice. He went to the wizard's room.",
    clue:"🗝️ 단서 발견! — The intruder went to the wizard's room."
  },
  /* ── ROOM 3: 마법사의 방 · what ── */
  {
    title:"ROOM 3 · 마법사의 방",
    emoji:"📖",
    storyKr:"마법사는 중요한 무언가를 숨겼습니다.\n그것이 마스터 키의 위치를 알려줄지도 모릅니다.",
    storyEn:"The wizard hid something important here.\nIt might reveal where the Master Key is.",

function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

/* ── 버튼 클릭음 (웅장한 마법 타격음) ── */
function sfxClick(){
  try{
    const ctx=getAudioCtx();
    const now=ctx.currentTime;

    // 1) 낮은 베이스 타격 (묵직함)
    const bass=ctx.createOscillator();
    const bassG=ctx.createGain();
    bass.connect(bassG); bassG.connect(ctx.destination);
    bass.type='sine';
    bass.frequency.setValueAtTime(120, now);
    bass.frequency.exponentialRampToValueAtTime(60, now+0.25);
    bassG.gain.setValueAtTime(0.5, now);
    bassG.gain.exponentialRampToValueAtTime(0.001, now+0.3);
    bass.start(now); bass.stop(now+0.3);

    // 2) 중음 울림 (마법 차임 느낌)
    const mid=ctx.createOscillator();
    const midG=ctx.createGain();
    mid.connect(midG); midG.connect(ctx.destination);
    mid.type='triangle';
    mid.frequency.setValueAtTime(320, now);
    mid.frequency.exponentialRampToValueAtTime(240, now+0.2);
    midG.gain.setValueAtTime(0.25, now);
    midG.gain.exponentialRampToValueAtTime(0.001, now+0.35);
    mid.start(now); mid.stop(now+0.35);

    // 3) 고음 반짝임 (마법 느낌)
    const high=ctx.createOscillator();
    const highG=ctx.createGain();
    high.connect(highG); highG.connect(ctx.destination);
    high.type='sine';
    high.frequency.setValueAtTime(880, now+0.02);
    high.frequency.exponentialRampToValueAtTime(1200, now+0.1);
    highG.gain.setValueAtTime(0, now);
    highG.gain.linearRampToValueAtTime(0.12, now+0.03);
    highG.gain.exponentialRampToValueAtTime(0.001, now+0.22);
    high.start(now); high.stop(now+0.25);

    // 4) 노이즈 타격감 (짧은 임팩트)
    const bufSize=ctx.sampleRate*0.05;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1)*(1-i/bufSize);
    const noise=ctx.createBufferSource();
    noise.buffer=buf;
    const noiseF=ctx.createBiquadFilter();
    noiseF.type='bandpass'; noiseF.frequency.value=200; noiseF.Q.value=0.8;
    const noiseG=ctx.createGain();
    noise.connect(noiseF); noiseF.connect(noiseG); noiseG.connect(ctx.destination);
    noiseG.gain.setValueAtTime(0.18, now);
    noiseG.gain.exponentialRampToValueAtTime(0.001, now+0.08);
    noise.start(now); noise.stop(now+0.08);

  }catch(e){}
}

/* ═══════════════ MYSTERY BGM ═══════════════ */
/*
  구성: 낮은 드론(베이스) + 느린 아르페지오(마법 분위기) + 고음 반짝임
  Web Audio로 순수 생성 — 외부 파일 없음
*/
function bgmStart(){
  if(bgmPlaying) return;
  try{
    const ctx=getAudioCtx();
    bgmPlaying=true;
    bgmNodes={};

    // 1) 베이스 드론 (낮은 으스스한 울림)
    const droneFreqs=[55, 82.4, 110];
    droneFreqs.forEach((f,i)=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      const filt=ctx.createBiquadFilter();
      filt.type='lowpass'; filt.frequency.value=300;
      o.connect(filt); filt.connect(g); g.connect(ctx.destination);
      o.type= i===0 ? 'sawtooth' : 'sine';
      o.frequency.value=f;
      // 천천히 진동 (비브라토)
      const lfo=ctx.createOscillator();
      const lfoG=ctx.createGain();
      lfo.frequency.value=0.3+i*0.1;
      lfoG.gain.value=1.2;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      lfo.start();
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.04-i*0.008, ctx.currentTime+3);
      o.start();
      bgmNodes[`drone${i}`]={osc:o,gain:g,lfo};
    });

    // 2) 느린 마법 아르페지오 (반복 루프)
    // Am 계열 신비로운 코드
    const arpNotes=[220, 261.6, 329.6, 392, 440, 392, 329.6, 261.6];
    const arpSpeed=1.1; // 초
    let arpStep=0;
    function arpTick(){
      if(!bgmPlaying) return;
      try{
        const ctx2=getAudioCtx();
        const f=arpNotes[arpStep % arpNotes.length];
        const o=ctx2.createOscillator();
        const g=ctx2.createGain();
        const rev=ctx2.createConvolver(); // 간단한 리버브 대신 딜레이
        const delay=ctx2.createDelay(2);
        const delayG=ctx2.createGain();
        delay.delayTime.value=0.45;
        delayG.gain.value=0.25;
        o.connect(g);
        g.connect(ctx2.destination);
        g.connect(delay); delay.connect(delayG); delayG.connect(ctx2.destination);
        o.type='triangle';
        o.frequency.value=f;
        const t=ctx2.currentTime;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.07,t+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,t+arpSpeed*0.85);
        o.start(t); o.stop(t+arpSpeed);
        arpStep++;
      }catch(e){}
      bgmNodes.arpTimer=setTimeout(arpTick, arpSpeed*1000);
    }
    arpTick();

    // 3) 고음 반짝임 (랜덤 간격)
    function sparkleTick(){
      if(!bgmPlaying) return;
      try{
        const ctx3=getAudioCtx();
        const sparkFreqs=[1047,1319,1568,2093];
        const f=sparkFreqs[Math.floor(Math.random()*sparkFreqs.length)];
        const o=ctx3.createOscillator();
        const g=ctx3.createGain();
        o.connect(g); g.connect(ctx3.destination);
        o.type='sine'; o.frequency.value=f;
        const t=ctx3.currentTime;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.04,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
        o.start(t); o.stop(t+0.6);
      }catch(e){}
      bgmNodes.sparkleTimer=setTimeout(sparkleTick, 1800+Math.random()*2500);
    }
    setTimeout(sparkleTick, 2000);

  }catch(e){ bgmPlaying=false; }
}

function bgmStop(){
  if(!bgmPlaying) return;
  bgmPlaying=false;
  try{
    // 드론 페이드아웃
    ['drone0','drone1','drone2'].forEach(k=>{
      if(bgmNodes[k]){
        const {osc,gain,lfo}=bgmNodes[k];
        const ctx=getAudioCtx();
        gain.gain.setValueAtTime(gain.gain.value,ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.5);
        setTimeout(()=>{ try{osc.stop();lfo.stop();}catch(e){} },1600);
      }
    });
    // 타이머 클리어
    clearTimeout(bgmNodes.arpTimer);
    clearTimeout(bgmNodes.sparkleTimer);
    bgmNodes={};
  }catch(e){}
}

/* ═══════════════ TTS ═══════════════ */
let ttsUtter=null;
let ttsPlaying=false;

// 자연스러운 영어 목소리 우선순위 (브라우저별 최고 품질)
const VOICE_PRIORITY=[
  // Chrome/Edge 고품질 온라인 목소리
  'Google US English','Google UK English Female','Google UK English Male',
  // macOS/iOS 자연스러운 목소리
  'Samantha','Karen','Daniel','Moira','Tessa',
  // Windows 고품질
  'Microsoft Aria Online (Natural)','Microsoft Jenny Online (Natural)',
  'Microsoft Guy Online (Natural)','Microsoft Zira Desktop',
  'Microsoft David Desktop',
  // 기타 영어
  'Alex','Victoria','Fiona',
];

function pickBestVoice(){
  const voices=speechSynthesis.getVoices();
  // 1순위: 이름 매칭
  for(const name of VOICE_PRIORITY){
    const v=voices.find(v=>v.name===name);
    if(v) return v;
  }
  // 2순위: 이름에 'Natural' 포함된 영어 목소리
  const natural=voices.find(v=>v.lang.startsWith('en')&&v.name.includes('Natural'));
  if(natural) return natural;
  // 3순위: en-US 로컬 목소리
  const local=voices.find(v=>v.lang==='en-US'&&v.localService);
  if(local) return local;
  // 4순위: 아무 영어 목소리
  return voices.find(v=>v.lang.startsWith('en')) || null;
}

function ttsSpeak(text, onEnd){
  ttsStop();
  if(!window.speechSynthesis) return;
  ttsUtter=new SpeechSynthesisUtterance(text);
  ttsUtter.lang='en-US';
  ttsUtter.rate=0.84;   // 약간 천천히 — 학생이 듣기 좋게
  ttsUtter.pitch=1.0;   // 자연스러운 피치
  ttsUtter.volume=1.0;
  const voice=pickBestVoice();
  if(voice) ttsUtter.voice=voice;
  ttsUtter.onstart=()=>{ ttsPlaying=true; updateTtsBtn(true); };
  ttsUtter.onend=()=>{ ttsPlaying=false; updateTtsBtn(false); if(onEnd)onEnd(); };
  ttsUtter.onerror=()=>{ ttsPlaying=false; updateTtsBtn(false); if(onEnd)onEnd(); };
  speechSynthesis.speak(ttsUtter);
}
function ttsStop(){
  if(window.speechSynthesis) speechSynthesis.cancel();
  ttsPlaying=false; ttsUtter=null; updateTtsBtn(false);
}
function ttsToggle(text){
  if(ttsPlaying){ ttsStop(); }
  else { ttsSpeak(text); }
}
function updateTtsBtn(playing){
  const btn=document.getElementById('tts-btn');
  if(!btn)return;
  btn.textContent= playing ? '⏹ 멈추기' : '🔊 듣기';
  btn.className= 'tts-btn'+(playing?' playing':'');
}

/* ═══════════════ RENDER ROOT ═══════════════ */
function render(){
  ttsStop(); // 화면 전환 시 항상 TTS 중단
  const app=document.getElementById('app');
  let html='';

  if(scene==='title'){
    html=renderTitle();
    setTimeout(bgmStart, 300); // 타이틀 진입 시 BGM 시작
  } else if(scene==='version'){
    html=renderVersion();
  } else if(scene==='story'){
    html=renderStory();
  } else if(scene==='quiz'){
    html=renderQuiz();
  } else if(scene==='orbAnswer'){
    html=renderOrbAnswer();
  } else if(scene==='end'){
    html=renderEnd();
  }

  app.innerHTML=html;

  // 홈 버튼 표시 제어
  const hw=document.getElementById('home-btn-wrap');
  if(hw) hw.style.display=(scene==='title'||scene==='version')?'none':'block';
}

    <div class="room-title">난이도를 선택하세요</div>
    <div class="ver-wrap">
      <div class="ver-card A" onclick="selectVersion('A')">
        <span class="ver-badge A">A</span>
        <span class="ver-name" style="color:var(--teal);">Basic</span>
        <span class="ver-desc">의문사를 4개 중에서<br>골라 선택하기</span>
      </div>
      <div class="ver-card B" onclick="selectVersion('B')">
        <span class="ver-badge B">B</span>
        <span class="ver-name" style="color:var(--gold);">Advanced</span>
        <span class="ver-desc">단어 카드를 탭해서<br>올바른 순서로 나열하기</span>
      </div>
    </div>
  </div>`;
}

/* ── ROOM MAP HTML ── */
function roomMapHtml(){
  const whs=['where','who','what','where','when','why'];
  const nodes=ROOMS.map((r,i)=>{
    const cls=i<roomIdx?'done':i===roomIdx?'active':'';
    const check=i<roomIdx?'✓':'';
    return `<div class="rm-node ${cls}">
      <div class="rm-dot">${check||r.emoji}</div>
      <div class="rm-label">${whs[i]}</div>
    </div>${i<ROOMS.length-1?'<div class="rm-arrow">›</div>':''}`;
  }).join('');
  return `<div class="room-map">${nodes}</div>`;
}

function renderStory(){
  const r=ROOMS[roomIdx];
  const lines=r.storyKr.split('\n');
  const enLines=r.storyEn.split('\n');
  return `
  <div class="scene">
    ${progBar()}
    ${roomMapHtml()}
    ${orbSmHtml()}
    <div class="room-title">${r.emoji} ${r.title}</div>
    <div class="story-box">
      ${lines.map((l,i)=>`${l}<span class="eng-sub">${enLines[i]||''}</span>`).join('<br>')}
    </div>
    <button class="btn-main btn-purple" onclick="goQuiz()">🔮 수정구슬에게 질문하기</button>
  </div>`;
}

function renderQuiz(){
  const r=ROOMS[roomIdx];
  const vLabel=version==='A'
    ? `<span class="step-pill">VERSION A · 의문사 선택</span>`
    : `<span class="step-pill">VERSION B · 단어 순서 나열</span>`;

  if(version==='A'){
    return `
    <div class="scene">
      ${progBar()}
      ${orbSmHtml()}
      <div class="room-title">${r.title}</div>
      ${vLabel}
      <div class="step-block">
        <p class="q-text">${r.questionA}<br><small>${r.questionAen}</small></p>
        <div class="opt-grid" id="opts">
          ${r.optionsA.map(o=>`<button class="opt-btn" onclick="checkA(this,'${o}')">${o}</button>`).join('')}
        </div>
      </div>
      <div id="finalBox" class="hidden">
        <div class="final-box">
          <div class="final-sent">✅ ${r.finalA}</div>
          <div class="speak-hint" id="speak-hint">🔊 읽어드릴게요...</div>
        </div>
      </div>
    </div>`;
  } else {
    // B version — init pool if needed
    if(bPool.length===0 && bPlaced.length===0){
      bPool=shuffle([...r.wordsB]);
      bPlaced=[];
    }
    return renderBQuiz(r);
  }
}

function renderBQuiz(r){
  const vLabel=`<span class="step-pill">VERSION B · 단어 순서 나열</span>`;
  const poolHtml=bPool.map((w,i)=>
    `<div class="w-card pool" onclick="placeWord(${i})">${w}</div>`
  ).join('');
  const placedHtml=bPlaced.map((w,i)=>
    `<div class="w-card placed" onclick="returnWord(${i})">${w}</div>`
  ).join('');

  return `
  <div class="scene">
    ${progBar()}
    ${orbSmHtml()}
    <div class="room-title">${r.title}</div>
    ${vLabel}
    <div class="step-block">
      <div class="step-pill" style="margin-bottom:.4rem;">문장 앞부분</div>
      <div style="font-size:.9rem;font-weight:700;color:var(--purple-lt);padding:.3rem 0;">"${r.sentencePrefix} _______ ?"</div>
      <div class="step-pill" style="margin-top:.6rem;">단어 카드 (탭해서 나열하기)</div>
      <div class="word-pool" id="pool">${poolHtml||'<span style="color:var(--dim);font-size:.8rem;">모두 배치했습니다</span>'}</div>
      <span class="slot-label">▼ 여기에 순서대로 나열하세요</span>
      <div class="word-slot" id="placed">${placedHtml}</div>
    </div>
    <button class="check-btn" id="checkBtn" onclick="checkB()" ${bPlaced.length===r.wordsB.length?'':'disabled'}>확인하기 ✓</button>
    <div id="finalBox" class="hidden">
      <div class="final-box">
        <div class="final-sent">✅ ${r.finalB}</div>
        <div class="speak-hint" id="speak-hint">🔊 읽어드릴게요...</div>
      </div>
    </div>
  </div>`;
}

function renderOrbAnswer(){
  const r=ROOMS[roomIdx];
  return `
  <div class="scene" style="text-align:center;">
    ${progBar()}
    <div class="ans-label">✦ THE CRYSTAL BALL SPEAKS ✦</div>
    <div class="orb-big-wrap">
      <div class="ripple"></div><div class="ripple"></div><div class="ripple"></div>
      <div class="orb-big" id="orb-big" style="background:${r.orbBg};box-shadow:${r.orbGlow};">
        <div class="orb-icon">${r.orbIcon}</div>
      </div>
    </div>
    <div class="speech-bubble">
      <div class="speech-kr">${r.speechKr}</div>
      <div class="speech-en">${r.speechEn}</div>
    </div>
    <div class="clue-bar">${r.clue}</div>
    <button class="btn-main btn-purple" style="margin-top:1.2rem;" onclick="goNext()">
      ${roomIdx<ROOMS.length-1 ? '다음 방으로 이동 ✦' : '🎉 탈출 완료!'}
    </button>
  </div>`;
}

function renderEnd(){
  return `
  <div class="scene" style="text-align:center;">
    ${progBar()}
    ${orbSmHtml('happy')}
    <div class="room-title">✦ ESCAPE COMPLETE ✦</div>
    <div class="story-box" style="text-align:center;">
      마스터 키를 찾았습니다! 탑을 탈출했습니다.<span class="eng-sub">You found the Master Key and escaped the tower!</span>
    </div>
    <span class="end-emoji">🎉</span>
    <div class="end-title">Congratulations!</div>
    <button class="btn-main btn-purple" style="margin-top:1.2rem;" onclick="restart()">다시 도전하기 ↺</button>
  </div>`;
}

/* ═══════════════ NAVIGATION ═══════════════ */
function goVersion(){ sfxClick(); scene='version'; render(); }
function startGame(){
  sfxClick();
  bgmStop();
  const btn=document.getElementById('start-btn');
  if(btn){ btn.textContent='🔊 읽는 중...'; btn.disabled=true; }
  setTimeout(()=>ttsSpeak(TTS_TITLE, ()=>{ goVersion(); }), 800);
}
function selectVersion(v){
  sfxClick();
  version=v; roomIdx=0; bPool=[]; bPlaced=[]; scene='story'; render();
}
function goQuiz(){ sfxClick(); scene='quiz'; bPool=[]; bPlaced=[]; render(); }
function goOrbAnswer(){
  sfxClick(); scene='orbAnswer'; render();
  setTimeout(()=>{
    const o=document.getElementById('orb-big'); if(!o)return;
    sfxOrb();
    const r=o.getBoundingClientRect();
    burst(r.left+r.width/2, r.top+r.height/2, 18);
    setTimeout(()=>burst(r.left+r.width/2, r.top+r.height/2, 12), 500);
  },200);
}
function goNext(){
  sfxClick();
  if(roomIdx<ROOMS.length-1){ roomIdx++; bPool=[]; bPlaced=[]; scene='story'; }
  else{ scene='end'; }
  render();
}
function restart(){ sfxClick(); version=null; roomIdx=0; bPool=[]; bPlaced=[]; scene='title'; render(); }
function goHome(){
  sfxClick();
  // confirm() 대신 인라인 확인 UI 표시
  const app=document.getElementById('app');
  const prev=app.innerHTML;
  app.innerHTML=`
  <div class="scene" style="text-align:center;padding-top:1rem;">
    <div style="font-size:2.5rem;margin-bottom:1rem;">🏠</div>
    <div class="room-title">처음으로 돌아가기</div>
    <div class="story-box" style="text-align:center;margin-bottom:1.4rem;">
      진행 상황이 초기화됩니다.<span class="eng-sub">Your progress will be reset.</span>
    </div>
    <button class="btn-main btn-purple" onclick="confirmHome()" style="margin-bottom:.6rem;">네, 돌아갈게요</button>
    <button class="btn-main" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);" onclick="cancelHome()">계속 플레이할게요</button>
  </div>`;
}
function confirmHome(){
  sfxClick(); version=null; roomIdx=0; bPool=[]; bPlaced=[]; scene='title'; render();
}
function cancelHome(){
  sfxClick(); render(); // 원래 화면으로 복귀
}

/* ── 정답 문장 읽기 → 수정구슬 자동 전환 ── */
function readFinalThenOrb(sentence){
  // 힌트 텍스트 업데이트
  const hint=document.getElementById('speak-hint');
  if(hint) hint.textContent='🔊 읽는 중...';

  // 잠깐 보여준 뒤 TTS 시작
  setTimeout(()=>{
    ttsSpeak(sentence, ()=>{
      // TTS 끝나면 힌트 텍스트 변경 후 0.6초 뒤 수정구슬 화면으로
      const h=document.getElementById('speak-hint');
      if(h){ h.textContent='🎤 선생님께 크게 말해보세요!'; }
      setTimeout(()=>goOrbAnswer(), 900);
    });
  }, 400);
}

/* ═══════════════ A — CHECK ═══════════════ */
function checkA(btn, selected){
  const r=ROOMS[roomIdx];
  const allBtns=document.querySelectorAll('.opt-btn');
  if(selected===r.wh){
    sfxCorrect();
    btn.classList.add('correct');
    allBtns.forEach(b=>b.disabled=true);
    const rc=btn.getBoundingClientRect();
    burst(rc.left+rc.width/2, rc.top+rc.height/2);
    setOrbSm('happy');
    // finalBox 표시
    document.getElementById('finalBox').classList.remove('hidden');
    // 정답 문장 TTS 읽기 → 끝나면 자동으로 수정구슬 화면으로
    readFinalThenOrb(r.finalA);
  } else {
    sfxWrong();
    btn.classList.add('wrong');
    setOrbSm('sad');
    setTimeout(()=>{ btn.classList.remove('wrong'); setOrbSm('neutral'); },600);
  }
}

/* ═══════════════ B — WORD CARDS ═══════════════ */
function placeWord(poolIdx){
  sfxClick();
  bPlaced.push(bPool[poolIdx]);
  bPool.splice(poolIdx,1);
  render();
}
function returnWord(placedIdx){
  sfxClick();
  bPool.push(bPlaced[placedIdx]);
  bPlaced.splice(placedIdx,1);
  render();
}
function checkB(){
  const correct=ROOMS[roomIdx].wordsB;
  const isCorrect=bPlaced.length===correct.length && bPlaced.every((w,i)=>w===correct[i]);
  const placedEls=document.querySelectorAll('#placed .w-card');
  if(isCorrect){
    sfxCorrect();
    placedEls.forEach(el=>{ el.classList.remove('placed'); el.classList.add('correct-card'); });
    document.getElementById('checkBtn').disabled=true;
    document.querySelectorAll('#pool .w-card').forEach(el=>el.style.pointerEvents='none');
    const ob=document.querySelector('.orb-sm');
    if(ob) ob.style.background='radial-gradient(circle at 35% 30%,#b8ffd4 0%,#00e5c4 30%,#007a60 70%,#001a14 100%)';
    const rect=placedEls[0]?.getBoundingClientRect();
    if(rect) burst(rect.left+rect.width/2, rect.top+rect.height/2);
    document.getElementById('finalBox').classList.remove('hidden');
    // 정답 문장 TTS 읽기 → 끝나면 자동으로 수정구슬 화면으로
    readFinalThenOrb(ROOMS[roomIdx].finalB);
  } else {
    sfxWrong();
    placedEls.forEach(el=>{ el.classList.add('wrong-card'); });
    setTimeout(()=>{
      // reset: put all placed back to pool
      bPool=[...bPool,...bPlaced];
      bPlaced=[];
      bPool=shuffle(bPool);
      render();
    },700);
  }
}

/* ═══════════════ HELPERS ═══════════════ */
function setOrbSm(mood){
  const o=document.getElementById('orb-sm'); if(!o)return;
  const bgs={
    neutral:'radial-gradient(circle at 35% 30%,#d4b8ff 0%,#b084ff 25%,#7b4fff 55%,#2a0060 100%)',
    happy:'radial-gradient(circle at 35% 30%,#b8ffd4 0%,#00e5c4 30%,#007a60 70%,#001a14 100%)',
    sad:'radial-gradient(circle at 35% 30%,#ffd0d8 0%,#ff6b6b 30%,#800020 70%,#1a0005 100%)',
  };
  o.style.background=bgs[mood]||bgs.neutral;
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

/* ── INIT ── */
// 목소리 미리 로드 (브라우저 지연 보정)
if(window.speechSynthesis){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
}
render();
</script>
